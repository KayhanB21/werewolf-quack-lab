<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Werewolf Quack Lab</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Werewolf Quack Lab</p>
          <h1>Round Runner</h1>
        </div>
        <div id="status" class="status" data-state="idle">Idle</div>
      </header>

      <section class="workspace">
        <aside class="controls" aria-label="Lab controls">
          <form id="settings" class="settings">
            <fieldset class="provider-field">
              <legend>Provider</legend>
              <div class="provider-options">
                <label class="provider-choice">
                  <input type="radio" name="provider" value="stub" checked />
                  <span>
                    <strong>Scripted</strong>
                    <small>No model</small>
                  </span>
                </label>
                <label class="provider-choice">
                  <input type="radio" name="provider" value="omlx" />
                  <span>
                    <strong>oMLX</strong>
                    <small>Local</small>
                  </span>
                </label>
                <label class="provider-choice">
                  <input type="radio" name="provider" value="openai-compatible" />
                  <span>
                    <strong>Compatible</strong>
                    <small>Custom URL</small>
                  </span>
                </label>
                <label class="provider-choice">
                  <input type="radio" name="provider" value="openai" />
                  <span>
                    <strong>OpenAI</strong>
                    <small>Hosted</small>
                  </span>
                </label>
              </div>
            </fieldset>

            <label>
              Round
              <input id="round" name="round" type="number" min="1" value="1" />
            </label>

            <div class="model-row">
              <label>
                Model
                <input
                  id="model"
                  name="model"
                  autocomplete="off"
                  placeholder="not used"
                />
              </label>
              <button class="secondary discover-button" type="button" data-discover>Discover</button>
            </div>

            <label>
              Base URL
              <input
                id="baseUrl"
                name="baseUrl"
                autocomplete="off"
                value="http://host.docker.internal:8000/v1"
              />
            </label>

            <label>
              API Key
              <input id="apiKey" name="apiKey" type="password" autocomplete="off" />
            </label>
          </form>

          <div class="button-grid" aria-label="Round actions">
            <button type="button" data-action="start">Start</button>
            <button type="button" data-action="day">Day</button>
            <button type="button" data-action="publicLog">Public Log</button>
            <button type="button" data-action="wolf">Wolf</button>
            <button type="button" data-action="wolfChannel">Wolf Channel</button>
            <button type="button" data-action="denied">Denied Scope</button>
            <button class="primary" type="button" data-action="fullRound">Full Round</button>
            <button type="button" data-action="whoami">Whoami</button>
            <button type="button" data-action="smoke">Smoke</button>
            <button class="danger" type="button" data-action="stop">Stop</button>
          </div>
        </aside>

        <section class="output" aria-label="Command output">
          <div class="output-bar">
            <span id="activeCommand">No command running</span>
            <button class="secondary" type="button" data-clear>Clear</button>
          </div>
          <div id="timeline" class="timeline" aria-live="polite"></div>
          <details class="raw-details">
            <summary>Raw stream</summary>
            <pre id="log" tabindex="0"></pre>
          </details>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
