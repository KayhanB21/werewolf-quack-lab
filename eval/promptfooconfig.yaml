description: "werewolf-quack-lab research eval matrix"
maxConcurrency: 1

prompts:
  - "Run the werewolf eval profile {{profile}}"

providers:
  - id: file://providers/werewolf-run.mjs
    label: local-omlx-mini
    config:
      profile: eval/profiles/omlx-qwen35-mini.json
      server: http://localhost:5174

tests:
  - description: "local omlx daily research smoke"
    vars:
      profile: eval/profiles/omlx-qwen35-mini.json
      game_count: 1
  - description: "stub pipeline sanity"
    vars:
      profile: eval/profiles/stub-smoke.json
      game_count: 1
